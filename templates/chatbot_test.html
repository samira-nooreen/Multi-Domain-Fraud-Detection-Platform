<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Test</title>
    <link rel="stylesheet" href="/static/css/chatbot.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0f;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        h1 {
            color: #6366f1;
        }

        .info {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <h1>MDFDP Chatbot Test Page</h1>
    <div class="info">
        <p>This is a test page for the chatbot widget.</p>
        <p>The chatbot button should appear in the bottom-right corner.</p>
        <p>Click it to open the chat window.</p>
    </div>

    <!-- Chatbot Widget -->
    <div class="chatbot-container">
        <button id="chatbot-toggle" class="chatbot-toggle">
            <svg viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" />
            </svg>
        </button>

        <div id="chatbot-window" class="chatbot-window">
            <div class="chatbot-header">
                <div class="chatbot-title">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />
                    </svg>
                    MDFDP Bot
                </div>
                <button id="chatbot-close" class="chatbot-close">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor">
                        <path
                            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                    </svg>
                </button>
            </div>
            <div id="chatbot-messages" class="chatbot-messages"></div>
            <div class="chatbot-input-area">
                <input type="text" id="chatbot-input" class="chatbot-input" placeholder="Ask me anything...">
                <button id="chatbot-send" class="chatbot-send">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/chatbot.js"></script>
</body>

</html>
