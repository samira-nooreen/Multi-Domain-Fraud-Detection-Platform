<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MDFDP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: #14141b;
            border-radius: 20px;
            padding: 50px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid #1a1a23;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header .shield-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #8876f8 0%, #7059d2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-header .shield-icon svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        .auth-header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #b7b3c9;
            font-size: 1rem;
        }

        .auth-form .form-group {
            margin-bottom: 25px;
        }

        .auth-form label {
            display: block;
            margin-bottom: 10px;
            color: #e6e6e6;
            font-weight: 600;
            font-size: 1rem;
        }

        .auth-form input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #29293a;
            border-radius: 10px;
            font-size: 1rem;
            background: #0d0d0f;
            color: #e6e6e6;
            transition: all 0.3s ease;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #8876f8;
            box-shadow: 0 0 0 3px rgba(136, 118, 248, 0.15);
        }

        .auth-form .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8876f8 0%, #7059d2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .auth-form .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(136, 118, 248, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            color: #b7b3c9;
        }

        .auth-footer a {
            color: #8876f8;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .alert-error {
            background: rgba(235, 51, 73, 0.15);
            border: 1px solid rgba(235, 51, 73, 0.3);
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(17, 153, 142, 0.15);
            border: 1px solid rgba(17, 153, 142, 0.3);
            color: #38ef7d;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="shield-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
                    </svg>
                </div>
                <h1>Create Account</h1>
                <p>Join Multi-Domain Fraud Detection Platform</p>
            </div>

            {% if error %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form class="auth-form" method="POST" action="/signup">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a strong password"
                        minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                        placeholder="Confirm your password">
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>
    </div>
</body>

</html>
